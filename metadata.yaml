name: arknights_gacha
display_name: 明日方舟工具箱
description: 明日方舟工具箱 v2.2.0 - 抽卡模拟、素材合成查询、关卡掉落查询
author: 皮皮朱
version: 2.2.0
changelog: |
  v2.2.0:
  - 新增游戏素材渲染器，完美还原明日方舟抽卡界面
  - 十连结果使用游戏原版 1280x720 模板合成
  - 单抽结果使用游戏原版角色立绘
  - 素材缺失时自动 fallback 到程序化卡片渲染
  - 所有命令添加 event.stop_event()，阻止 LLM 在插件命令后继续回复
  - 修复十连保底数据不一致问题（单事务重写 pull_ten）
  - 修复扣费与抽卡非原子操作问题
  - 实现 UP 干员名称匹配机制
  - 修复限定干员识别（基于 itemObtainApproach）
  - 修复临时文件泄漏（上下文管理器）
  - 修复素材下载镜像代理回退
  - 修复多个防御性编程问题（除零、bare except、字段名错误）
  - 统一代码常量，消除重复代码
  v2.1.0:
  - 重构抽卡结果 UI 渲染，采用卡片式网格布局
  - 新增稀有度渐变背景效果（6星红橙/5星金黄/4星淡紫）
  - 新增五角星图标替代文字星级，避免字体乱码
  - 新增干员头像加载支持（resource/avatars 目录）
  - 新增 NEW 徽章标记新干员
  - 新增重复次数标记
  - 优化十连结果统计展示
  - 优化素材合成树渲染，支持动态高度计算
  - 优化掉落关卡列表，添加交替背景色
repo: https://github.com/zhuruce123123-collab/arknights_gacha
main: main.py
